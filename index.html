<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --bg-color: #0a0a16;
            --text-color: #ffffff;
            --accent-color: #7000ff;
            --glow-color: #ff007f;
            --muted-color: #8a8a9e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* Ambient background glows */
        .glow-sphere {
            position: absolute;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15) 0%, rgba(0,0,0,0) 70%);
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--text-color) 30%, var(--accent-color), var(--glow-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -5px;
            animation: float 6s ease-in-out infinite;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--muted-color);
            font-size: clamp(1rem, 2vw, 1.15rem);
            margin-top: 12px;
            margin-bottom: 40px;
            max-width: 450px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Lost in the deep end?</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="#" class="btn">Take Me Home</a>
    </div>

</body>
</html>
