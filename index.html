<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lapa nav atrasta</title>
    <style>
        :root {
            --bg-color: #05020a;       /* Dziļi melns ar violetu apakštoni */
            --text-color: #ffffff;     /* Balts teksts */
            --accent-purple: #8a2be2;  /* Spilgti violets */
            --dark-purple: #3d0066;    /* Tumši violets mirdzums */
            --muted-color: #a39cb0;    /* Pelēcīgi violets tekstam */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* Fona mirdzuma efekts */
        .glow-sphere {
            position: absolute;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.2) 0%, rgba(5, 2, 10, 0) 70%);
            width: 700px;
            height: 700px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .error-code {
            font-size: clamp(8rem, 22vw, 15rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 20%, var(--accent-purple), var(--dark-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(138, 43, 226, 0.3));
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-top: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--muted-color);
            font-size: clamp(1rem, 2vw, 1.15rem);
            margin-top: 12px;
            margin-bottom: 40px;
            max-width: 480px;
            line-height: 1.6;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            background: rgba(138, 43, 226, 0.15);
            border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            background: var(--accent-purple);
            color: #fff;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
            transform: translateY(-3px);
        }

        /* Lēnā peldēšanas animācija */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Lapa netika atrasta</h1>
        <p>Izskatās, ka meklētā lapa vairs neeksistē, ir pārvietota vai arī ievadītā saite ir neprecīza.</p>
        <a href="/" class="btn">Atgriezties sākumā</a>
    </div>

</body>
</html>
